<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 AutoPoster Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .fade-in{animation:fadeIn .4s ease-out}
        .slide-up{animation:slideUp .5s ease-out}
        .pulse{animation:pulse 2s infinite}
        .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.1);transition:all .3s}
        .card:hover{box-shadow:0 20px 25px -5px rgba(0,0,0,.1);transform:translateY(-2px)}
        .btn{padding:10px 20px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .3s}
        .btn:hover{transform:translateY(-1px);box-shadow:0 10px 15px -3px rgba(0,0,0,.1)}
        .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
        .btn-success{background:linear-gradient(135deg,#10b981,#34d399);color:#fff}
        .btn-danger{background:linear-gradient(135deg,#ef4444,#f87171);color:#fff}
        .btn-warning{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#1e293b}
        .btn-sm{padding:6px 14px;font-size:11px;border-radius:8px}
        .input-field{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;outline:none;background:#f8fafc;transition:all .3s}
        .input-field:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1);background:#fff}
        .status-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
        .status-published{background:#d1fae5;color:#065f46}
        .status-scheduled{background:#dbeafe;color:#1e40af}
        .status-processing{background:#fef3c7;color:#92400e}
        .status-failed{background:#fee2e2;color:#991b1b}
        .status-draft{background:#f1f5f9;color:#475569}
        .platform-card{border:2px solid #e2e8f0;border-radius:14px;padding:16px 12px;transition:all .3s;text-align:center;cursor:pointer;background:#fff}
        .platform-card:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,.08)}
        .platform-card.connected{border-color:#34d399;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
        .platform-card.selected{border-color:#6366f1;background:linear-gradient(135deg,#eef2ff,#e0e7ff)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
        .modal-content{background:#fff;border-radius:20px;max-width:650px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease-out;padding:30px}
        .toast{position:fixed;top:20px;right:20px;z-index:9999;animation:slideUp .3s ease-out;padding:14px 20px;border-radius:12px;color:#fff;font-weight:600;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
        .filter-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid #e2e8f0;background:#f8fafc;color:#64748b;transition:all .2s}
        .filter-btn.active{background:#6366f1;color:#fff;border-color:#6366f1}
        .progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:8px}
        .progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:3px;transition:width .5s ease}
    </style>
</head>
<body class="min-h-screen">

    <!-- HEADER -->
    <header class="bg-white shadow-lg sticky top-0 z-50 border-b-4 border-indigo-500">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center flex-wrap gap-3">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🚀</span>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">AutoPoster Pro</h1>
                    <p class="text-xs text-gray-500">Social Media Automation • One Click, All Platforms</p>
                </div>
            </div>
            <div class="flex gap-2 flex-wrap">
                <span id="serverDot" class="flex items-center gap-2 text-xs bg-green-100 text-green-700 px-3 py-1.5 rounded-full font-semibold">
                    <span class="w-2 h-2 bg-green-500 rounded-full pulse"></span> Connected
                </span>
                <button onclick="showConnectModal()" class="btn btn-success btn-sm"><i class="fas fa-link"></i> Connect Account</button>
                <button onclick="showCreatePostModal()" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> New Post</button>
                <button onclick="loadAllData()" class="btn btn-sm" style="background:#e2e8f0;color:#475569"><i class="fas fa-sync-alt"></i></button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- STATS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="statsGrid">
            <div class="card fade-in"><p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Total Posts</p><p class="text-3xl font-bold text-gray-900 mt-2" id="statTotal">0</p></div>
            <div class="card fade-in"><p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Published</p><p class="text-3xl font-bold text-green-600 mt-2" id="statPublished">0</p></div>
            <div class="card fade-in"><p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Scheduled</p><p class="text-3xl font-bold text-blue-600 mt-2" id="statScheduled">0</p></div>
            <div class="card fade-in"><p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Failed</p><p class="text-3xl font-bold text-red-600 mt-2" id="statFailed">0</p></div>
        </div>

        <!-- ACCOUNTS -->
        <div class="mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-plug text-indigo-500 mr-2"></i>Connected Accounts <span class="text-sm font-normal text-gray-400" id="accountCount"></span></h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-8 gap-3" id="accountsGrid">
                <div class="col-span-full text-center text-gray-400 py-6">Loading...</div>
            </div>
        </div>

        <!-- POSTS -->
        <div class="card" style="padding:0;overflow:hidden">
            <div class="p-5 border-b bg-gradient-to-r from-indigo-50 to-blue-50 flex flex-wrap justify-between items-center gap-3">
                <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-paper-plane text-indigo-500 mr-2"></i>Your Posts</h2>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="filterPosts('all')" id="filterAll" class="filter-btn active">All</button>
                    <button onclick="filterPosts('draft')" id="filterDraft" class="filter-btn">Drafts</button>
                    <button onclick="filterPosts('scheduled')" id="filterScheduled" class="filter-btn">Scheduled</button>
                    <button onclick="filterPosts('published')" id="filterPublished" class="filter-btn">Published</button>
                    <button onclick="filterPosts('failed')" id="filterFailed" class="filter-btn">Failed</button>
                    <span class="text-sm text-gray-500 self-center font-semibold ml-2" id="postCount">0 posts</span>
                </div>
            </div>
            <div id="postsList" class="divide-y"></div>
        </div>
    </main>

    <!-- MODAL -->
    <div id="modalContainer"></div>

    <script>
        const API = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
        let posts = [], accounts = [], currentFilter = 'all';

        const PLATFORMS = [
            {id:'twitter',name:'Twitter/X',icon:'fa-x-twitter',color:'#1DA1F2'},
            {id:'facebook',name:'Facebook',icon:'fa-facebook',color:'#1877F2'},
            {id:'instagram',name:'Instagram',icon:'fa-instagram',color:'#E4405F'},
            {id:'linkedin',name:'LinkedIn',icon:'fa-linkedin',color:'#0A66C2'},
            {id:'youtube',name:'YouTube',icon:'fa-youtube',color:'#FF0000'},
            {id:'tiktok',name:'TikTok',icon:'fa-tiktok',color:'#000000'},
            {id:'pinterest',name:'Pinterest',icon:'fa-pinterest',color:'#BD081C'},
            {id:'reddit',name:'Reddit',icon:'fa-reddit',color:'#FF4500'}
        ];

        function showToast(msg,type){
            const colors={success:'#10b981',error:'#ef4444',warning:'#f59e0b',info:'#6366f1'};
            const icons={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
            const t=document.createElement('div');
            t.className='toast';
            t.style.background=colors[type]||colors.info;
            t.innerHTML=`<span>${icons[type]||icons.info}</span> ${msg}`;
            document.body.appendChild(t);
            setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},3500);
        }

        async function loadAllData(){
            try{
                const [pRes,aRes,sRes]=await Promise.all([
                    fetch(API+'/posts?limit=100'),
                    fetch(API+'/accounts'),
                    fetch(API+'/analytics/overview')
                ]);
                const pData=await pRes.json();
                const aData=await aRes.json();
                const sData=await sRes.json();
                
                posts=pData.posts||[];
                accounts=aData.accounts||[];
                
                document.getElementById('statTotal').textContent=sData.totalPosts||0;
                document.getElementById('statPublished').textContent=sData.published||0;
                document.getElementById('statScheduled').textContent=sData.scheduled||0;
                document.getElementById('statFailed').textContent=sData.failed||0;
                document.getElementById('postCount').textContent=`${posts.length} posts`;
                document.getElementById('accountCount').textContent=`(${sData.totalAccounts||0}/8)`;
                document.getElementById('serverDot').innerHTML='<span class="w-2 h-2 bg-green-500 rounded-full pulse"></span> Connected';
                
                renderAccounts();
                renderPosts();
            }catch(e){
                document.getElementById('serverDot').innerHTML='<span class="w-2 h-2 bg-red-500 rounded-full"></span> Disconnected';
                document.getElementById('postsList').innerHTML='<div class="p-16 text-center text-red-500"><p class="text-lg font-semibold">⚠️ Cannot connect to server</p><p class="text-sm mt-1">Make sure the server is running</p></div>';
            }
        }

        function renderAccounts(){
            document.getElementById('accountsGrid').innerHTML=PLATFORMS.map(p=>{
                const conn=accounts.find(a=>a.platform===p.id);
                return `<div class="platform-card ${conn?'connected':''}">
                    <i class="fab ${p.icon} text-2xl" style="color:${p.color}"></i>
                    <div class="font-semibold text-xs mt-2">${p.name}</div>
                    <div class="text-xs mt-1 ${conn?'text-green-600 font-bold':'text-gray-400'}">${conn?'✅ Connected':'Not connected'}</div>
                    ${conn?`<button onclick="removeAccount('${conn.id}')" class="text-xs text-red-400 hover:text-red-600 mt-1 font-medium">Remove</button>`:''}
                </div>`;
            }).join('');
        }

        function filterPosts(filter){
            currentFilter=filter;
            document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            const btn=document.getElementById('filter'+filter.charAt(0).toUpperCase()+filter.slice(1));
            if(btn) btn.classList.add('active');
            renderPosts();
        }

        function renderPosts(){
            const filtered=currentFilter==='all'?posts:posts.filter(p=>p.status===currentFilter);
            const list=document.getElementById('postsList');
            
            if(!filtered.length){
                list.innerHTML=`<div class="p-16 text-center text-gray-400"><div class="text-5xl mb-4">📝</div><p class="text-lg font-semibold">No ${currentFilter==='all'?'':' '+currentFilter} posts</p><p class="text-sm mt-1">Create one to get started!</p></div>`;
                return;
            }
            
            list.innerHTML=filtered.map(post=>{
                const plats=post.platforms||[];
                const results=post.publish_results||[];
                const isScheduled=post.status==='scheduled';
                const sTime=post.scheduled_time?new Date(post.scheduled_time):null;
                const timeLeft=sTime&&isScheduled?Math.max(0,Math.floor((sTime-new Date())/1000)):0;
                
                let timeStr='';
                if(isScheduled&&timeLeft>0){
                    const h=Math.floor(timeLeft/3600),m=Math.floor((timeLeft%3600)/60),s=timeLeft%60;
                    timeStr=`${h>0?h+'h ':''}${m}m ${s}s remaining`;
                }else if(isScheduled&&timeLeft<=0){
                    timeStr='⚠️ Past due - Click Publish Now';
                }
                
                return `
                <div class="p-5 hover:bg-gray-50 transition-all fade-in">
                    <div class="flex flex-col lg:flex-row justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-2 flex-wrap">
                                <h3 class="font-bold text-lg text-gray-800">${post.title||'Untitled Post'}</h3>
                                <span class="status-badge status-${post.status}">${post.status}</span>
                            </div>
                            <p class="text-sm text-gray-600 mb-2">${(post.caption||'No caption').substring(0,250)}</p>
                            ${post.hashtags?`<p class="text-sm text-indigo-600 mb-2">${post.hashtags}</p>`:''}
                            <div class="flex flex-wrap gap-1 mb-2">${plats.map(p=>`<span class="text-xs bg-gray-100 px-2 py-0.5 rounded-full font-medium"><i class="fab fa-${p} mr-1"></i>${p}</span>`).join('')}</div>
                            
                            ${isScheduled&&sTime?`
                                <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-200 mt-2">
                                    <div class="flex items-center gap-2 text-sm text-indigo-700 font-semibold">
                                        <i class="fas fa-clock"></i>
                                        <span>📅 ${sTime.toLocaleString()}</span>
                                    </div>
                                    <div class="mt-1 text-xs text-indigo-600 font-semibold">${timeStr}</div>
                                    <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,Math.max(5,100-(timeLeft/86400)*100))}%"></div></div>
                                </div>`:''}
                            
                            ${results.length?`<div class="mt-2 space-y-1">${results.map(r=>`<div class="text-xs flex items-center gap-2 ${r.success?'text-green-600':'text-red-500'}"><i class="fas fa-${r.success?'check-circle':'times-circle'}"></i><span class="font-medium">${r.platform}:</span> ${r.success?'Published ✅':r.error}</div>`).join('')}</div>`:''}
                        </div>
                        
                        <div class="flex items-center gap-2 shrink-0 flex-wrap">
                            ${(post.status==='draft'||post.status==='failed'||(isScheduled&&timeLeft<=0))?`<button onclick="publishPost('${post.id}')" class="btn btn-success btn-sm pulse"><i class="fas fa-paper-plane"></i> Publish Now</button>`:''}
                            ${post.status==='scheduled'?`<button onclick="editSchedule('${post.id}')" class="btn btn-warning btn-sm"><i class="fas fa-edit"></i> Edit</button>`:''}
                            ${post.status==='processing'?`<button disabled class="btn btn-warning btn-sm pulse"><i class="fas fa-spinner fa-spin"></i> Publishing...</button>`:''}
                            ${post.status==='published'?`<span class="text-green-600 font-bold text-sm">✅ Done</span>`:''}
                            <button onclick="deletePost('${post.id}')" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ==================== MODALS ====================
        function showConnectModal(){
            document.getElementById('modalContainer').innerHTML=`
                <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                    <div class="modal-content">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-link text-indigo-500 mr-2"></i>Connect Account</h2>
                            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                        </div>
                        
                        <div class="grid grid-cols-4 gap-2 mb-6">
                            ${PLATFORMS.map(p=>`<div onclick="selectPlatform('${p.id}')" id="plat-${p.id}" class="platform-card">
                                <i class="fab ${p.icon} text-2xl" style="color:${p.color}"></i>
                                <div class="text-xs font-semibold mt-1">${p.name}</div>
                            </div>`).join('')}
                        </div>
                        <a href="/auth/google" style="display:block;background:#ea4335;color:white;padding:12px;border-radius:10px;text-align:center;text-decoration:none;font-weight:bold;margin-bottom:15px"><i class="fab fa-google mr-2"></i> Login with Google (YouTube)</a>
<hr style="margin:15px 0">
<p style="text-align:center;color:#999;font-size:13px">— OR Manual Token —</p>

                <!-- ⭐⭐⭐ YAHAN SE PASTE KARO ⭐⭐⭐ -->
                <div style="background:#f0fdf4;border:2px solid #22c55e;border-radius:12px;padding:15px;margin-bottom:20px">
                    <h3 style="font-weight:bold;margin-bottom:10px">🚀 One-Click Connect</h3>
                   
                    
                    <a href="/auth/facebook" style="display:block;background:#1877f2;color:white;padding:12px;border-radius:10px;text-align:center;text-decoration:none;font-weight:bold">
                        <i class="fab fa-facebook mr-2"></i> Login with Facebook (+Instagram)
                    </a>
                </div>
                
                <hr style="margin:15px 0">
                <p style="text-align:center;color:#999;font-size:13px">— OR Manual Token —</p>
                <!-- ⭐⭐⭐ YAHAN TAK PASTE KARO ⭐⭐⭐ -->
               
                        <form id="connectForm" class="space-y-4">
                            <input type="hidden" id="connPlatform" value="">
                            <div><label class="block text-sm font-semibold text-gray-700 mb-1">🔑 Access Token *</label><input type="text" id="connToken" placeholder="Paste your access token" class="input-field" required></div>
                            <div><label class="block text-sm font-semibold text-gray-700 mb-1">🆔 User/Page ID *</label><input type="text" id="connUserId" placeholder="Your user or page ID" class="input-field" required></div>
                            <div><label class="block text-sm font-semibold text-gray-700 mb-1">👤 Username (Optional)</label><input type="text" id="connUsername" placeholder="@username" class="input-field"></div>
                            <div class="bg-blue-50 p-4 rounded-xl text-xs text-gray-600">
                                <strong>🔍 How to get tokens:</strong><br>
                                Twitter: developer.twitter.com | Facebook: developers.facebook.com<br>
                                LinkedIn: developer.linkedin.com | YouTube: console.cloud.google.com
                            </div>
                            <div class="flex gap-2">
                                <button type="button" onclick="verifyToken()" class="btn flex-1 btn-sm" style="background:#3b82f6;color:white"><i class="fas fa-check-circle"></i> Verify</button>
                                <button type="submit" class="btn btn-success flex-1"><i class="fas fa-link"></i> Connect</button>
                            </div>
                        </form>
                    </div>
                </div>`;
            document.getElementById('connectForm').addEventListener('submit',connectAccount);
        }

        function selectPlatform(p){
            document.getElementById('connPlatform').value=p;
            document.querySelectorAll('#modalContainer .platform-card').forEach(c=>c.classList.remove('selected'));
            document.getElementById('plat-'+p)?.classList.add('selected');
        }

        async function verifyToken(){
            const platform=document.getElementById('connPlatform').value;
            const token=document.getElementById('connToken').value;
            if(!platform||!token)return showToast('Select platform and enter token','warning');
            showToast('Verifying...','info');
            try{
                const res=await fetch(API+'/verify-token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({platform,token})});
                const d=await res.json();
                if(d.valid){showToast('✅ Valid! '+(d.username||d.name||''),'success');if(d.id)document.getElementById('connUserId').value=d.id;if(d.username)document.getElementById('connUsername').value=d.username;}
                else showToast('❌ Invalid token','error');
            }catch(e){showToast('Verification failed','error');}
        }

        async function connectAccount(e){
            e.preventDefault();
            const platform=document.getElementById('connPlatform').value;
            if(!platform)return showToast('Select a platform!','warning');
            try{
                const res=await fetch(API+'/accounts/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({platform,accessToken:document.getElementById('connToken').value,platformUserId:document.getElementById('connUserId').value,platformUsername:document.getElementById('connUsername').value})});
                const d=await res.json();
                if(res.ok){showToast(d.message,'success');closeModal();loadAllData();}
                else showToast(d.error,'error');
            }catch(e){showToast('Connection failed','error');}
        }

        function showCreatePostModal(){
            document.getElementById('modalContainer').innerHTML=`
                <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                    <div class="modal-content">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-plus text-indigo-500 mr-2"></i>Create New Post</h2>
                            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                        </div>
                        <form id="createPostForm" class="space-y-4">
                            <input type="text" id="postTitle" placeholder="Post Title" class="input-field">
                            <textarea id="postCaption" rows="4" placeholder="Write your caption..." class="input-field"></textarea>
                            <input type="text" id="postHashtags" placeholder="#hashtags #social" class="input-field">
                            <div><label class="block text-sm font-semibold text-gray-700 mb-2">📱 Select Platforms *</label>
                                <div class="grid grid-cols-4 gap-2">${accounts.map(a=>`<label class="platform-card" style="cursor:pointer"><input type="checkbox" value="${a.platform}" class="plat-check"> <i class="fab fa-${a.platform} text-xl" style="color:${PLATFORMS.find(p=>p.id===a.platform)?.color||'#666'}"></i><div class="text-xs font-semibold mt-1">${a.platform}</div></label>`).join('')}
                                ${!accounts.length?'<p class="col-span-full text-sm text-red-500 text-center">Connect an account first!</p>':''}
                                </div>
                            </div>
                            <div><label class="block text-sm font-semibold text-gray-700 mb-1">📎 Media (Image/Video)</label><input type="file" id="postMedia" accept="image/*,video/*" class="input-field"><p class="text-xs text-gray-400 mt-1">Max 100MB</p></div>
                            <div><label class="block text-sm font-semibold text-gray-700 mb-1">⏰ Schedule (Optional)</label><input type="datetime-local" id="postSchedule" class="input-field"><p class="text-xs text-gray-400 mt-1">Leave empty to save as draft</p></div>
                            <div class="flex gap-3">
                                <button type="button" onclick="closeModal()" class="btn flex-1" style="background:#e2e8f0;color:#475569">Cancel</button>
                                <button type="submit" class="btn btn-primary flex-1"><i class="fas fa-plus"></i> Create Post</button>
                            </div>
                        </form>
                    </div>
                </div>`;
            document.getElementById('createPostForm').addEventListener('submit',createPost);
        }

        async function createPost(e){
            e.preventDefault();
            const plats=[...document.querySelectorAll('.plat-check:checked')].map(c=>c.value);
            if(!plats.length)return showToast('Select at least one platform!','warning');
            const fd=new FormData();
            fd.append('title',document.getElementById('postTitle').value);
            fd.append('caption',document.getElementById('postCaption').value);
            fd.append('hashtags',document.getElementById('postHashtags').value);
            fd.append('platforms',JSON.stringify(plats));
            fd.append('scheduledTime',document.getElementById('postSchedule').value);
            const f=document.getElementById('postMedia').files[0];
            if(f)fd.append('media',f);
            try{
                const res=await fetch(API+'/posts',{method:'POST',body:fd});
                const d=await res.json();
                if(res.ok){showToast(d.message,'success');closeModal();loadAllData();}
                else showToast(d.error,'error');
            }catch(e){showToast('Failed to create post','error');}
        }

        // ==================== ACTIONS ====================
        async function publishPost(id){
            if(!confirm('Publish this post NOW to all selected platforms?'))return;
            showToast('Publishing...','info');
            try{
                const res=await fetch(API+'/posts/'+id+'/publish',{method:'POST'});
                const d=await res.json();
                if(d.success)showToast('✅ Published successfully!','success');
                else if(d.partial)showToast('⚠️ Partially published - check results','warning');
                else showToast('❌ Publishing failed','error');
                loadAllData();
            }catch(e){showToast('Publishing error','error');}
        }

        async function editSchedule(id){
            const post=posts.find(p=>p.id===id);
            if(!post)return;
            const newTime=prompt('Enter new schedule time:\n(YYYY-MM-DDTHH:MM)',post.scheduled_time?new Date(post.scheduled_time).toISOString().slice(0,16):'');
            if(!newTime)return;
            try{
                const fd=new FormData();
                fd.append('scheduledTime',new Date(newTime).toISOString());
                fd.append('platforms',JSON.stringify(post.platforms||[]));
                fd.append('title',post.title||'');
                fd.append('caption',post.caption||'');
                await fetch(API+'/posts/'+id,{method:'PUT',body:fd});
                showToast('Schedule updated! ✅','success');
                loadAllData();
            }catch(e){showToast('Failed to update','error');}
        }

        async function deletePost(id){
            if(!confirm('Delete this post permanently? This cannot be undone.'))return;
            try{
                await fetch(API+'/posts/'+id,{method:'DELETE'});
                showToast('Post deleted','info');
                loadAllData();
            }catch(e){showToast('Failed to delete','error');}
        }

        async function removeAccount(id){
            if(!confirm('Remove this account? You can reconnect anytime.'))return;
            try{
                await fetch(API+'/accounts/'+id,{method:'DELETE'});
                showToast('Account removed','info');
                loadAllData();
            }catch(e){showToast('Failed to remove','error');}
        }

        function closeModal(){document.getElementById('modalContainer').innerHTML='';}

        // ==================== INIT ====================
        loadAllData();
        setInterval(loadAllData,60000);
        console.log('🚀 AutoPoster Pro Ready!');
    </script>
</body>
</html>
